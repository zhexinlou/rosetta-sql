<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Query — Rosetta</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- marked.js for markdown rendering in AI chat -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.09);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.15);
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #0d1b2e 50%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,18,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .nav-left { display: flex; align-items: center; gap: 20px; }

    .nav-brand {
      font-size: 17px;
      font-weight: 700;
      color: #60a5fa;
    }

    .db-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 100px;
      border: 1px solid;
    }

    .db-badge.connected {
      color: #86efac;
      border-color: rgba(34,197,94,0.3);
      background: rgba(34,197,94,0.08);
    }

    .db-badge.disconnected {
      color: #fca5a5;
      border-color: rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.08);
    }

    .db-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .nav-right { display: flex; align-items: center; gap: 16px; }

    .nav-right a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-right a:hover { color: var(--text); }

    /* ── Layout ───────────────────────────────────────────────── */
    .workspace {
      display: flex;
      flex: 1;
      gap: 0;
      margin-top: 60px;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px;
      overflow: hidden;
    }

    .panel + .panel {
      border-left: 1px solid var(--border);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 20px;
    }

    /* ── Stock Panel ──────────────────────────────────────────── */
    .stock-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-row { display: flex; gap: 10px; }
    .form-row .field { flex: 1; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder { color: #475569; }
    .field input:focus { border-color: var(--accent); }
    .field input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    }

    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8, var(--accent));
      color: #fff;
      box-shadow: 0 3px 12px rgba(59,130,246,0.3);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 5px 16px rgba(59,130,246,0.45);
    }

    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .stock-result {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stock-result img {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 36px; opacity: 0.4; }
    .empty-state p { font-size: 13px; }

    /* ── Chat Panel ───────────────────────────────────────────── */
    .chat-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .mode-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .mode-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── Messages ─────────────────────────────────────────────── */
    .msg { display: flex; gap: 10px; animation: fadeSlideUp 0.2s ease; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .msg.user .msg-avatar { background: #334155; color: #94a3b8; }
    .msg.bot  .msg-avatar { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }

    .msg-body { max-width: 85%; display: flex; flex-direction: column; gap: 6px; }
    .msg.user .msg-body { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: #1e293b;
      border: 1px solid #334155;
      color: var(--text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* markdown inside bot bubbles */
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 8px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble pre code {
      background: none;
      padding: 0;
      font-size: 12.5px;
    }

    /* SQL block */
    .sql-block {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .sql-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }

    .sql-block-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      padding: 3px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .copy-btn.copied { color: #86efac; border-color: rgba(34,197,94,0.3); }

    .sql-code {
      padding: 12px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Results table */
    .result-table-wrapper {
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    .result-table th {
      padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    .result-table td {
      padding: 7px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-table tr:last-child td { border-bottom: none; }
    .result-table tr:hover td { background: rgba(255,255,255,0.025); }

    .result-meta {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Context banner */
    .ctx-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(59,130,246,0.08);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #93c5fd;
    }

    .ctx-banner.visible { display: flex; }

    .ctx-banner-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
    }

    .ctx-banner-dismiss:hover { color: var(--text); }

    .error-bubble {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ────────────────────────────────────────────── */
    .chat-input-area {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .chat-input::placeholder { color: #475569; }
    .chat-input:focus { border-color: var(--accent); }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* scrollbar for stock panel */
    .stock-result::-webkit-scrollbar { width: 4px; }
    .stock-result::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <span class="nav-brand">Rosetta</span>
    <div class="db-badge disconnected" id="dbBadge">
      <span class="dot"></span>
      <span id="dbBadgeText">Not connected</span>
    </div>
  </div>
  <div class="nav-right">
    <a href="config.html">Change database</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<div class="workspace">

  <!-- ── Left: Stock chart ── -->
  <div class="panel" id="stockPanel">
    <div class="panel-title">Stock Chart</div>

    <form class="stock-form" id="stockForm">
      <div class="field">
        <label for="symbolInput">Stock symbol</label>
        <input type="text" id="symbolInput" placeholder="e.g. BHP" required>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="startDateInput">Start date</label>
          <input type="date" id="startDateInput" required>
        </div>
        <div class="field">
          <label for="endDateInput">End date</label>
          <input type="date" id="endDateInput" required>
        </div>
      </div>
      <button class="btn btn-primary" type="submit" id="stockBtn">Generate chart</button>
    </form>

    <div class="stock-result" id="stockResult">
      <div class="empty-state">
        <div class="icon">📈</div>
        <p>Enter a symbol and date range above.</p>
      </div>
    </div>
  </div>

  <!-- ── Right: NL Query chat ── -->
  <div class="panel" id="chatPanel">
    <div class="chat-toolbar">
      <div class="panel-title" style="margin-bottom:0">Natural Language Query</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="mode-toggle">
          <button class="mode-btn active" id="mysqlBtn">SQL</button>
          <button class="mode-btn" id="aiBtn">AI Chat</button>
        </div>
        <button class="btn btn-ghost" id="clearBtn" title="Clear chat" style="padding:6px 10px;font-size:12px;">Clear</button>
      </div>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="ctx-banner" id="ctxBanner">
      <span>📊</span>
      <span id="ctxBannerText">SQL context attached — ask me to analyze the data</span>
      <button class="ctx-banner-dismiss" onclick="clearSqlContext()" title="Remove context">✕</button>
    </div>

    <div class="chat-input-area">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Ask anything about your database…"
        rows="1"
      ></textarea>
      <button class="btn btn-primary" id="sendBtn" style="height:44px;padding:0 16px;">
        Send
      </button>
    </div>
  </div>

</div>

<script>
  // ── Marked config ─────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  // ── DB status ─────────────────────────────────────────────────────────────
  async function refreshDbStatus() {
    try {
      const res = await fetch('/db-status');
      const data = await res.json();
      const badge = document.getElementById('dbBadge');
      const text  = document.getElementById('dbBadgeText');
      if (data.connected) {
        badge.className = 'db-badge connected';
        text.textContent = data.database;
      } else {
        badge.className = 'db-badge disconnected';
        text.textContent = 'Not connected';
      }
    } catch (_) { /* ignore */ }
  }

  refreshDbStatus();

  // ── Helpers ───────────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function scrollBottom() {
    const box = document.getElementById('chatBox');
    box.scrollTop = box.scrollHeight;
  }

  // ── Message builders ──────────────────────────────────────────────────────
  function appendUserMessage(text) {
    const chatBox = document.getElementById('chatBox');
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-avatar">U</div>
      <div class="msg-body">
        <div class="msg-bubble">${escapeHtml(text)}</div>
      </div>`;
    chatBox.appendChild(el);
    scrollBottom();
    return el;
  }

  function appendTypingIndicator() {
    const chatBox = document.getElementById('chatBox');
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-bubble">
          <div class="typing-indicator">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
          </div>
        </div>
      </div>`;
    chatBox.appendChild(el);
    scrollBottom();
    return el;
  }

  function appendErrorMessage(text) {
    const chatBox = document.getElementById('chatBox');
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="error-bubble">${escapeHtml(text)}</div>
      </div>`;
    chatBox.appendChild(el);
    scrollBottom();
  }

  function buildSqlResponse(data) {
    const sql = data.query_generated;
    const rows = data.data;

    // SQL block
    const sqlId = 'sql-' + Date.now();
    let html = `
      <div class="sql-block">
        <div class="sql-block-header">
          <span class="sql-block-label">Generated SQL</span>
          <button class="copy-btn" data-sql="${escapeHtml(sql)}" onclick="copySql(this)">Copy</button>
        </div>
        <div class="sql-code">${escapeHtml(sql)}</div>
      </div>`;

    // Results
    if (Array.isArray(rows) && rows.length > 0) {
      const keys = Object.keys(rows[0]);
      const thead = keys.map(k => `<th>${escapeHtml(k)}</th>`).join('');
      const tbody = rows.map(row =>
        `<tr>${keys.map(k => `<td title="${escapeHtml(String(row[k] ?? ''))}">${escapeHtml(String(row[k] ?? ''))}</td>`).join('')}</tr>`
      ).join('');
      html += `
        <div class="result-table-wrapper">
          <table class="result-table">
            <thead><tr>${thead}</tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
          <span class="result-meta">${rows.length} row${rows.length !== 1 ? 's' : ''} returned</span>
          <button class="btn btn-ghost" onclick="switchToAiMode()" style="font-size:11px;padding:4px 10px;gap:4px;">🤖 Analyze with AI</button>
        </div>`;
    } else if (Array.isArray(rows) && rows.length === 0) {
      html += `<div class="result-meta">Query returned no rows.</div>`;
    } else if (rows && typeof rows.affectedRows === 'number') {
      html += `<div class="result-meta">${rows.affectedRows} row${rows.affectedRows !== 1 ? 's' : ''} affected.</div>`;
    }

    return html;
  }

  function appendSqlResponse(data) {
    const chatBox = document.getElementById('chatBox');
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-bubble">${buildSqlResponse(data)}</div>
      </div>`;
    chatBox.appendChild(el);
    scrollBottom();

    // Inject SQL result into chatHistory so AI Chat mode always has it in-context
    if (Array.isArray(data.data) && data.data.length > 0) {
      lastSqlContext = { sql: data.query_generated, rows: data.data };

      // Remove any previous SQL context markers from history to avoid stale data
      const prevCtxIdx = chatHistory.findIndex(m => m._sqlCtx);
      if (prevCtxIdx !== -1) chatHistory.splice(prevCtxIdx, 2); // remove marker + assistant pair

      const dataStr = JSON.stringify(data.data.slice(0, 100), null, 2);
      chatHistory.push({
        _sqlCtx: true,
        role: 'user',
        content: `[SQL query result]\nQuery: \`${data.query_generated}\`\nRows (${data.data.length}):\n\`\`\`json\n${dataStr}\n\`\`\``,
      });
      chatHistory.push({
        role: 'assistant',
        content: `Got it — I can see the query returned ${data.data.length} row${data.data.length !== 1 ? 's' : ''}. Switch to AI Chat and ask me anything about this data.`,
      });

      updateContextBanner();
    }
  }

  function appendAiResponse(text) {
    const chatBox = document.getElementById('chatBox');
    const el = document.createElement('div');
    el.className = 'msg bot';
    // marked renders markdown; risk is low since text comes from our own OpenAI call
    el.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-bubble">${marked.parse(text)}</div>
      </div>`;
    chatBox.appendChild(el);
    scrollBottom();
  }

  // ── Copy SQL ──────────────────────────────────────────────────────────────
  function copySql(btn) {
    const sql = btn.getAttribute('data-sql');
    navigator.clipboard.writeText(sql).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      btn.textContent = 'Failed';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  }

  // ── Conversation state ────────────────────────────────────────────────────
  let chatHistory   = [];   // [{role:'user'|'assistant', content:string}]
  let lastSqlContext = null; // {sql:string, rows:any[]}

  function updateContextBanner() {
    const banner = document.getElementById('ctxBanner');
    if (currentMode === 'ai' && lastSqlContext) {
      const preview = lastSqlContext.sql.length > 60
        ? lastSqlContext.sql.slice(0, 60) + '…'
        : lastSqlContext.sql;
      document.getElementById('ctxBannerText').textContent =
        `📊 SQL context: ${lastSqlContext.rows.length} rows from "${preview}"`;
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }
  }

  function clearSqlContext() {
    lastSqlContext = null;
    updateContextBanner();
  }

  // ── Mode toggle ───────────────────────────────────────────────────────────
  let currentMode = 'mysql';
  const chatInput = document.getElementById('chatInput');

  document.getElementById('mysqlBtn').addEventListener('click', () => {
    currentMode = 'mysql';
    document.getElementById('mysqlBtn').classList.add('active');
    document.getElementById('aiBtn').classList.remove('active');
    chatInput.placeholder = 'Ask anything about your database…';
    updateContextBanner();
  });

  document.getElementById('aiBtn').addEventListener('click', () => {
    currentMode = 'ai';
    document.getElementById('aiBtn').classList.add('active');
    document.getElementById('mysqlBtn').classList.remove('active');
    chatInput.placeholder = lastSqlContext
      ? 'Ask me to analyze the data, or anything else…'
      : 'Ask the AI anything…';
    updateContextBanner();
  });

  function switchToAiMode() {
    currentMode = 'ai';
    document.getElementById('aiBtn').classList.add('active');
    document.getElementById('mysqlBtn').classList.remove('active');
    chatInput.placeholder = 'Ask me to analyze the data, or anything else…';
    updateContextBanner();
    chatInput.focus();
  }

  // ── Clear chat ────────────────────────────────────────────────────────────
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('chatBox').innerHTML = '';
    chatHistory = [];
    updateContextBanner();
  });

  // ── Send message ──────────────────────────────────────────────────────────
  let isLoading = false;

  async function sendMessage() {
    if (isLoading) return;
    const text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    appendUserMessage(text);

    const mode = currentMode;
    let endpoint, body;

    if (mode === 'mysql') {
      endpoint = '/submit-query';
      body = { userInput: text };
    } else {
      endpoint = '/gpt-chat';
      chatHistory.push({ role: 'user', content: text });
      // Strip client-only marker before sending; keep role+content only
      const cleanHistory = chatHistory.map(({ role, content }) => ({ role, content }));
      body = { messages: cleanHistory };
    }

    const indicator = appendTypingIndicator();
    isLoading = true;
    setSendBtnLoading(true);

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      indicator.remove();

      if (data.error) {
        if (mode === 'ai') chatHistory.pop(); // undo failed message
        appendErrorMessage(data.error);
      } else if (mode === 'mysql') {
        appendSqlResponse(data);
      } else {
        chatHistory.push({ role: 'assistant', content: data.response });
        appendAiResponse(data.response);
      }
    } catch (err) {
      indicator.remove();
      if (mode === 'ai') chatHistory.pop();
      appendErrorMessage('Network error: ' + err.message);
    } finally {
      isLoading = false;
      setSendBtnLoading(false);
    }
  }

  function setSendBtnLoading(loading) {
    const btn = document.getElementById('sendBtn');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>' : 'Send';
  }

  document.getElementById('sendBtn').addEventListener('click', sendMessage);

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });

  // ── Stock chart ───────────────────────────────────────────────────────────
  document.getElementById('stockForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const symbol    = document.getElementById('symbolInput').value.trim();
    const startDate = document.getElementById('startDateInput').value;
    const endDate   = document.getElementById('endDateInput').value;
    const result    = document.getElementById('stockResult');
    const btn       = document.getElementById('stockBtn');

    if (startDate > endDate) {
      result.innerHTML = `<div class="error-bubble">Start date must be before end date.</div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Loading…';
    result.innerHTML = `
      <div class="empty-state">
        <div class="icon" style="animation: spin 1s linear infinite">⏳</div>
        <p>Generating chart…</p>
      </div>`;

    try {
      const res = await fetch('/plot-stock', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbol, startDate, endDate }),
      });

      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || 'Server error');
      }

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      result.innerHTML = `<img src="${url}" alt="${escapeHtml(symbol)} stock chart">`;
    } catch (err) {
      result.innerHTML = `<div class="error-bubble">${escapeHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Generate chart';
    }
  });
</script>
</body>
</html>
