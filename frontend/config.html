<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Database — Rosetta</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #0a0a12 0%, #0d1b2e 50%, #0a0a12 100%);
      color: #e2e8f0;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 0 48px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 10, 18, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 100;
    }

    .nav-brand { font-size: 18px; font-weight: 700; color: #60a5fa; }

    .nav-back {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #e2e8f0; }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 44px 48px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .card-header { margin-bottom: 28px; }
    .card-header h1 { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .card-header p  { font-size: 14px; color: #64748b; }

    /* DB type picker */
    .db-type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 24px;
    }

    .db-type-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .db-type-btn:hover { border-color: rgba(255,255,255,0.2); color: #e2e8f0; }

    .db-type-btn.active {
      background: rgba(59,130,246,0.12);
      border-color: rgba(59,130,246,0.5);
      color: #93c5fd;
    }

    .db-type-btn .db-icon { font-size: 16px; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: #475569; }
    .field input:focus { border-color: #3b82f6; background: rgba(59,130,246,0.05); }

    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }
    .row .field.port { flex: 0 0 100px; }

    .submit-btn {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .status {
      margin-top: 14px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    .status.success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #86efac; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">Rosetta</span>
    <a class="nav-back" href="index.html">← Back</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <h1>Connect your database</h1>
        <p>Select a database type and enter your connection details.</p>
      </div>

      <!-- DB type selector -->
      <div class="db-type-grid">
        <button class="db-type-btn active" data-type="mysql">
          <span class="db-icon">🐬</span> MySQL
        </button>
        <button class="db-type-btn" data-type="postgres">
          <span class="db-icon">🐘</span> PostgreSQL
        </button>
        <button class="db-type-btn" data-type="mssql">
          <span class="db-icon">🪟</span> SQL Server
        </button>
        <button class="db-type-btn" data-type="sqlite">
          <span class="db-icon">📦</span> SQLite
        </button>
      </div>

      <hr class="divider">

      <form id="configForm" novalidate>
        <!-- Remote DB fields (hidden for SQLite) -->
        <div id="remoteFields">
          <div class="row">
            <div class="field">
              <label for="dbHost">Host</label>
              <input type="text" id="dbHost" placeholder="localhost">
            </div>
            <div class="field port">
              <label for="dbPort">Port</label>
              <input type="text" id="dbPort" placeholder="3306">
            </div>
          </div>
          <div class="field">
            <label for="dbName">Database name</label>
            <input type="text" id="dbName" placeholder="my_database">
          </div>
          <div class="field">
            <label for="dbUser">User</label>
            <input type="text" id="dbUser" placeholder="root">
          </div>
          <div class="field">
            <label for="dbPassword">Password</label>
            <input type="password" id="dbPassword" placeholder="••••••••">
          </div>
        </div>

        <!-- SQLite-only field -->
        <div id="sqliteFields" style="display:none">
          <div class="field">
            <label for="sqliteFile">Database file path</label>
            <input type="text" id="sqliteFile" placeholder="/path/to/database.db">
          </div>
        </div>

        <button class="submit-btn" type="submit" id="submitBtn">Connect</button>
      </form>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const DEFAULT_PORTS = { mysql: '3306', postgres: '5432', mssql: '1433', sqlite: '' };
    let selectedType = 'mysql';

    // DB type selector
    document.querySelectorAll('.db-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.db-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedType = btn.dataset.type;

        const isSqlite = selectedType === 'sqlite';
        document.getElementById('remoteFields').style.display = isSqlite ? 'none' : 'block';
        document.getElementById('sqliteFields').style.display = isSqlite ? 'block' : 'none';

        if (!isSqlite) {
          document.getElementById('dbPort').value = DEFAULT_PORTS[selectedType];
        }

        document.getElementById('status').style.display = 'none';
      });
    });

    // Set initial port
    document.getElementById('dbPort').value = DEFAULT_PORTS['mysql'];

    function showStatus(type, message) {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = message;
      el.style.display = 'block';
    }

    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Connecting…' : 'Connect';
    }

    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('status').style.display = 'none';

      let body = { dbType: selectedType };

      if (selectedType === 'sqlite') {
        const file = document.getElementById('sqliteFile').value.trim();
        if (!file) return showStatus('error', 'File path is required.');
        body.dbName = file;
      } else {
        const dbHost     = document.getElementById('dbHost').value.trim();
        const dbPort     = document.getElementById('dbPort').value.trim();
        const dbName     = document.getElementById('dbName').value.trim();
        const dbUser     = document.getElementById('dbUser').value.trim();
        const dbPassword = document.getElementById('dbPassword').value;
        if (!dbHost || !dbName || !dbUser) {
          return showStatus('error', 'Host, database name, and user are required.');
        }
        body = { ...body, dbHost, dbPort, dbName, dbUser, dbPassword };
      }

      setLoading(true);

      try {
        const res  = await fetch('/configure-db', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.success) {
          showStatus('success', `Connected to "${data.database}" (${data.type}) successfully.`);
          setTimeout(() => { window.location.href = 'query.html'; }, 900);
        } else {
          showStatus('error', data.error || 'Connection failed.');
          setLoading(false);
        }
      } catch (err) {
        showStatus('error', 'Network error: ' + err.message);
        setLoading(false);
      }
    });
  </script>
</body>
</html>
